<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <title>Explore</title>
     <link rel="icon" type="image/x-icon" href="Images/Wok-logo-red.png">
      <link rel="stylesheet" href="style3.css">
</head>
<body>
     
  <div class="header">
    <div class="wok-logo">
        <img src="Images/Wok-logo-red.svg" alt="Wok Logo">
    </div>
    <h1>Explore</h1>
    </div>
    <div class="floating-nav">
  <a href="home.html"><img src="Images/home-icon-white.svg" alt="Home"></a>
  <a href="explore.html"><img src="Images/search-icon-white.svg" alt="Explore"></a>
  <a href="saved.html"><img src="Images/bookmark-icon-white.svg" alt="Saved"></a>
  <div class="post-button"></div>
    <a href="inbox.html"><img src="Images/inbox-icon-white.svg" alt="Inbox"></a>
  <a href="account.html"><img src="Images/account-icon-white.svg" alt="Account"></a>
  <a href="settings.html"><img src="Images/settings-icon-white.svg" alt="Settings"></a>
</div>


<div class="body-explore">
        <div class="searchfilter">
            <div class="search-container">
            <span class="search-icon"></span>
            <input type="text" class="search-input" placeholder="Food, Recipes, Restaurants...">
            </div>  
        <div class="recipes-bookmark">
            <div class="recipe-container" id="recipeButton">
            <div class="recipe-popup" id="recipePopup">
            <div class="recipe-header">
            <h4>Filter</h4>
            <img src="Images/filter-icon-red.svg" alt="">
            </div>
            
            <div class="explore-filter">
                
                <div class="searchfilter2">
                <div class="search-container2">
                <input type="text" class="search-input2" placeholder="Zip, or city state">
                <input type="text" class="search-input3" placeholder="US">
                   <span class="dropdown-icon"></span>
                     <span class="search-icon2"></span>
                </div>
                </div>
                 <div class="explore-location">
                    <img src="Images/location-icon-red.svg" alt="Location">
                    <p><u>Use my current location</u></p>
                </div>

                <div class="dropdown">
                <button class="dropdown-btn">Regions</button>
                <img src="Images/dropdown-icon-red.svg" alt="dropdown" class="filter-dropdown">

                <div class="dropdown-content">
                    <label><input type="checkbox" value="option1"> Option 1</label>
                    <label><input type="checkbox" value="option2"> Option 2</label>
                    <label><input type="checkbox" value="option3"> Option 3</label>
                    <label><input type="checkbox" value="option4"> Option 4</label>
                </div>
                </div>

                <div class="dropdown2">
                <button class="dropdown-btn2">Dish Type</button>
                <img src="Images/dropdown-icon-red.svg" alt="dropdown" class="filter-dropdown">
                </div>
                

                 <div class="dropdown3">
                <button class="dropdown-btn2">Meal Course</button>
                <img src="Images/dropdown-icon-red.svg" alt="dropdown" class="filter-dropdown">
                </div>

                <div class="dropdown4">
                <button class="dropdown-btn2">Dietary</button>
                <img src="Images/dropdown-icon-red.svg" alt="dropdown" class="filter-dropdown">
                </div>
            
               <button class="dropdown-btn-save">Save</button>
            </div>
        </div>
        </div>
</div>
</div>
<div class="scroll-container">
            <div class="explore-grid">
            <div class="grid-item"><img src="Images/explore-img1.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-2.jpg" /></div>
            <div class="grid-item large"><img src="Images/explore-img-9.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-4.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-5.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-6.jpg" /></div>

            <div class="grid-item"><img src="Images/explore-img-7.jpg" /></div>
            <div class="grid-item large"><img src="Images/explore-img-12.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-3.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-10.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-11.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-8.jpg" /></div>

           <div class="grid-item"><img src="Images/explore-img-13.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-14.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-15.jpg" /></div>
            <div class="grid-item"><img src="Images/explore-img-16.jpg" /></div>
            </div>

            
            </div>
        </div>

    
    
    <script>
        const recipeButton = document.getElementById('recipeButton');
  const recipePopup = document.getElementById('recipePopup');
    const btn = document.querySelector('.dropdown-btn');
  const menu = document.querySelector('.dropdown-content');

  btn.addEventListener('click', () => {
    menu.style.display = 
      menu.style.display === 'block' ? 'none' : 'block';
  });

  // Optional: close if clicking outside
  window.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      menu.style.display = 'none';
    }
  });

   recipeButton.addEventListener('click', () => {
  recipePopup.classList.toggle('active');
    document.body.classList.toggle("no-scroll");
});

    </script>

</body>
</html>
