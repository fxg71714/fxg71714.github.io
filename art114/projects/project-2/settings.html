<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap" rel="stylesheet">
    <title>Settings</title>
     <link rel="icon" type="image/x-icon" href="Images/Wok-logo-red.png">
      <link rel="stylesheet" href="style6.css">
</head>
<body>
     
  <div class="header">
    <div class="wok-logo">
        <img src="Images/Wok-logo-red.svg" alt="Wok Logo">
    </div>
    <h1>Settings</h1>
    </div>
    <div class="floating-nav">
  <a href="home.html"><img src="Images/home-icon-white.svg" alt="Home"></a>
  <a href="explore.html"><img src="Images/search-icon-white.svg" alt="Explore"></a>
  <a href="saved.html"><img src="Images/bookmark-icon-white.svg" alt="Saved"></a>
  <div class="post-button"></div>
    <a href="inbox.html"><img src="Images/inbox-icon-white.svg" alt="Inbox"></a>
  <a href="account.html"><img src="Images/account-icon-white.svg" alt="Account"></a>
  <a href="settings.html"><img src="Images/settings-icon-white.svg" alt="Settings"></a>
</div>


<div class="body-explore">
        <div class="searchfilter">
            <div class="search-container">
            <span class="search-icon"></span>
            <input type="text" class="search-input" placeholder="Password, Visibility...">
            </div>  
        <div class="recipes-bookmark">
            <div class="recipe-container" id="recipeButton">
            <div class="recipe-popup" id="recipePopup">
            <div class="recipe-header">
            <img src="Images/menu-icon-red.svg" alt="">
            </div>
            
            <div class="explore-filter">
          
                <button class="dropdown-btn">Profile</button>
              <p>Privacy & Safety</p>
                  <p>Notifications</p>
                  <p>Accessibility</p>
                  <p>Data & App Controls</p>
                  <p>Help & Community</p>

               
            
          
            </div>
        </div>
        </div>
</div>
</div>
<div class="scroll-container">
            
            <div class="inbox-container">
              <h3>Profile</h3>

              <div class="profile-container">
                <div class="profile-img"></div>
                <div class="edit-btn"></div>
            </div>
          
            <div class="profile-container">
              <p class="username">@janedoe</p>
              <div class="edit-btn2"></div>

            </div>

            <form class="profile-form">
            <div class="row">
              <div class="field">
                <label>Name</label>
                <input type="text" name="name" placeholder="Jane Doe">
              </div>

              <div class="field">
                <label>Date of Birth</label>
                <input type="date" name="dob">
              </div>

              <div class="field">
                <label>Pronouns</label>
                <input type="text" name="pronouns" class="pronoun">
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@gmail.com">
              </div>

              <div class="field">
                <label>Phone</label>
                <input type="tel" name="phone" placeholder="(123) 456-7890">
              </div>
            </div>

            <div class="row">
              <div class="field full">
                <label>Bio</label>
                <textarea name="bio" rows="4" placeholder="Something interesting about yourself..."></textarea>
              </div>
            </div>

            <div class="actions">
              <button type="submit">Save</button>
            </div>
          </form>
            </div>
        </div>

    
    
    <script>
        const recipeButton = document.getElementById('recipeButton');
  const recipePopup = document.getElementById('recipePopup');
    const btn = document.querySelector('.dropdown-btn');
  const menu = document.querySelector('.dropdown-content');

  btn.addEventListener('click', () => {
    menu.style.display = 
      menu.style.display === 'block' ? 'none' : 'block';
  });

  // Optional: close if clicking outside
  window.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      menu.style.display = 'none';
    }
  });

   recipeButton.addEventListener('click', () => {
  recipePopup.classList.toggle('active');
    document.body.classList.toggle("no-scroll");
});

    </script>

</body>
</html>
